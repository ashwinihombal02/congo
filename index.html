<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Congratulations Darlo!</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    font-family: Arial, sans-serif;
    overflow: hidden;
}

.card {
    background: white;
    padding: 40px;
    max-width: 600px;
    border-radius: 25px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    animation: floatIn 1s ease-out;
}

h1 {
    font-size: 3rem;
    margin-bottom: 15px;
    animation: pulse 2s infinite;
}

p {
    font-size: 1.3rem;
    color: #555;
    line-height: 1.6;
}

@keyframes floatIn {
    from {
        opacity: 0;
        transform: translateY(80px) scale(0.8);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
}
</style>
</head>
<body>

<div class="card">
    <h1>🎉 Congratulations Darlo! 🎉</h1>
    <p>
        I am so happy for you! 🌟<br><br>
        You've worked hard and deserve every bit of this success.
        Keep shining, keep growing, and enjoy this special moment.
        Wishing you even more amazing achievements ahead! ❤️
    </p>
</div>

<script>
function launchConfetti() {
    confetti({
        particleCount: 200,
        spread: 120,
        origin: { y: 0.6 }
    });
}

launchConfetti();

setInterval(() => {
    confetti({
        particleCount: 80,
        spread: 90,
        origin: { x: Math.random(), y: Math.random() * 0.5 }
    });
}, 2500);
</script>

</body>
</html>
