<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Congratulations</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    font-family:Arial,sans-serif;
}

.popup{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
    animation:pop 0.6s ease;
}

h1{
    color:#28a745;
    margin:0;
}

@keyframes pop{
    0%{
        transform:scale(0);
    }
    100%{
        transform:scale(1);
    }
}
</style>
</head>

<body>

<div class="popup">
    <h1>🎉 Congratulations! 🎉</h1>
    <p>You did it successfully.</p>
</div>

<script>
confetti({
    particleCount: 200,
    spread: 120,
    origin: { y: 0.6 }
});
</script>

</body>
</html>
